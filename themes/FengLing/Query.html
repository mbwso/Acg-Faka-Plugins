#{include file="Common/Header.html"}

<section class="fl-query">
    <div class="fl-query-card">
        <div class="fl-query-head">
            <h1><i class="fa fa-search"></i> 订单查询</h1>
            <p>输入下单时使用的联系方式或订单号，即可查询订单及卡密</p>
        </div>
        <div class="fl-query-search">
            <input type="text" class="fl-input keywords" placeholder="请输入联系方式或订单号" value="#{$tradeNo|default:''}">
            <button type="button" class="fl-btn fl-btn-primary query-btn">立即查询</button>
        </div>
    </div>

    <div class="fl-query-result">
        <div class="fl-query-empty notfound">
            <i class="fa fa-folder-open-o"></i>
            <p>暂未查询到相关订单，请确认输入是否正确</p>
        </div>
        <div class="fl-query-list order-success"></div>
    </div>
</section>

#{include file="Common/Footer.html"}

<script>
(function () {
    if (typeof acg === 'undefined' || !acg.ready) return;
    acg.ready("#{$from}", function () {
        var $keywords = $('.keywords');
        var $empty = $('.notfound');
        var $list = $('.order-success');

        function escapeHtml(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function renderOrder(order) {
            if (!order || !order.commodity || !order.pay) return '';
            var status = order.status === 1
                ? '<span class="fl-status fl-status-success">已支付</span>'
                : '<span class="fl-status fl-status-pending">未支付</span>';
            var race = order.race ? ' <em>(' + escapeHtml(order.race) + ')</em>' : '';
            var payTimeRow = order.status === 1
                ? '<div class="fl-order-row"><span>支付时间</span><strong>' + escapeHtml(order.pay_time) + '</strong></div>'
                : '';
            var leave = order.leave_message
                ? '<div class="fl-order-row"><span>使用说明</span><strong>' + escapeHtml(order.leave_message) + '</strong></div>'
                : '';
            var pwd = (order.commodity.password_status == 1 && !#{if $user}true#{else}false#{/if})
                ? '<input type="text" class="fl-input fl-order-pwd query-password passId-' + order.id + '" placeholder="请输入查询密码">'
                : '';

            return ''
                + '<article class="fl-order-card">'
                + '  <header class="fl-order-head">'
                + '    <h3>' + escapeHtml(order.commodity.name) + race + '</h3>'
                + '    ' + status
                + '  </header>'
                + '  <div class="fl-order-body">'
                + '    <div class="fl-order-row"><span>订单号</span><strong class="trade_no">' + escapeHtml(order.trade_no) + '</strong></div>'
                + '    <div class="fl-order-row"><span>下单金额</span><strong class="fl-order-amount">￥' + escapeHtml(order.amount) + '</strong></div>'
                + '    <div class="fl-order-row"><span>购买数量</span><strong>' + escapeHtml(order.card_num) + '</strong></div>'
                + '    <div class="fl-order-row"><span>下单时间</span><strong>' + escapeHtml(order.create_time) + '</strong></div>'
                + '    <div class="fl-order-row"><span>支付方式</span><strong><img src="' + escapeHtml(order.pay.icon) + '" alt=""> ' + escapeHtml(order.pay.name) + '</strong></div>'
                + '    ' + payTimeRow + leave
                + '  </div>'
                + '  <div class="fl-order-card-area">'
                + '    <div class="fl-order-card-tool">' + pwd + ' <button type="button" class="fl-btn fl-btn-primary getCard" data-id="' + order.id + '">查看卡密</button></div>'
                + '    <div class="fl-order-card-view cardInfoView-' + order.id + '" style="display:none">'
                + '      <textarea class="fl-textarea cardInfo-' + order.id + '" readonly></textarea>'
                + '    </div>'
                + '  </div>'
                + '</article>';
        }

        function query(keywords) {
            $empty.hide();
            $list.empty().hide();
            acg.API.query({
                keywords: keywords,
                success: function (order) {
                    $list.append(renderOrder(order));
                },
                yes: function () {
                    if ($list.children().length === 0) {
                        $empty.show();
                    } else {
                        $list.show();
                    }
                    $list.off('click', '.getCard').on('click', '.getCard', function () {
                        var orderId = $(this).attr('data-id');
                        acg.API.secret({
                            orderId: orderId,
                            password: $('.passId-' + orderId).val(),
                            success: function (res) {
                                var secret = '';
                                if (res.widget) {
                                    secret += '------- 隐私信息 -------\n';
                                    Object.keys(res.widget).forEach(function (k) {
                                        secret += res.widget[k].cn + '：' + res.widget[k].value + '\n';
                                    });
                                    secret += '------- 卡密信息 -------\n';
                                }
                                secret += res.secret;
                                $('.cardInfo-' + orderId).val(secret);
                                $('.cardInfoView-' + orderId).show(80);
                            }
                        });
                    });
                },
                error: function () {
                    $empty.show();
                }
            });
        }

        $('.query-btn').click(function () { query($keywords.val()); });
        $keywords.on('keydown', function (e) {
            if (e.which === 13) { e.preventDefault(); query($keywords.val()); }
        });

        #{if $tradeNo}query("#{$tradeNo}");#{elseif $user}query("");#{/if}
    });
}());
</script>
