#{include file="../Common/Header.html"}
<div class="mf-page-shell mf-page-shell-security">
    #{include file="../Common/Nav.html"}
    <main class="mf-main">
        <section class="mf-panel">
            #{include file="../Common/SecurityNav.html"}
            <form class="layui-form form-data">
                <div class="form-block">
                    <div>
                        <div class="form-header">旧密码</div>
                        <div class="form-body">
                            <input type="password" name="old_password" autocomplete="off" class="layui-input" placeholder="旧密码">
                        </div>
                    </div>

                    <div>
                        <div class="form-header">新密码</div>
                        <div class="form-body">
                            <input type="password" name="password" autocomplete="off" class="layui-input" placeholder="新密码">
                        </div>
                    </div>

                    <div>
                        <div class="form-header">确认新密码</div>
                        <div class="form-body">
                            <input type="password" name="re_password" autocomplete="off" class="layui-input" placeholder="确认新密码">
                        </div>
                    </div>

                    <div class="mf-page-actions mf-primary-action-bar mt-4">
                        <button type="button" class="layui-btn layui-btn-pink save-data mf-primary-action-button">
                            <i class="fa-duotone fa-regular fa-floppy-disk"></i> 保存修改
                        </button>
                    </div>
                </div>
            </form>
        </section>
    </main>
</div>
#{ready("/assets/user/controller/security/password.js")}
#{include file="../Common/Footer.html"}
